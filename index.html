<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksperimen Web GitHub - Color Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <header>
            <h1>Color Mixer 🎨</h1>
            <p>Geser slider di bawah untuk mencampurkan warna RGB secara langsung.</p>
        </header>

        <main>
            <div id="color-preview"></div>
            
            <div id="rgb-text">rgb(15, 23, 42)</div>

            <div class="mixer-control">
                <label id="label-red" for="red">Merah (R): <span id="val-red">15</span></label>
                <input type="range" id="red" min="0" max="255" value="15">
            </div>

            <div class="mixer-control">
                <label id="label-green" for="green">Hijau (G): <span id="val-green">23</span></label>
                <input type="range" id="green" min="0" max="255" value="23">
            </div>

            <div class="mixer-control">
                <label id="label-blue" for="blue">Biru (B): <span id="val-blue">42</span></label>
                <input type="range" id="blue" min="0" max="255" value="42">
            </div>
            
            <button id="reset-btn" class="btn">Reset Warna</button>
        </main>

        <footer>
            <p>&copy; 2026 Proyek Mixer Warna GitHub</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
